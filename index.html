<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hymeria Consulting</title>
  <meta name="robots" content="noindex">
  <link rel="canonical" href="https://www.hymeria.com/fr/">
  <link rel="alternate" hreflang="fr" href="https://www.hymeria.com/fr/">
  <link rel="alternate" hreflang="en" href="https://www.hymeria.com/en/">
  <link rel="alternate" hreflang="x-default" href="https://www.hymeria.com/fr/">
  <script>
    (function () {
      var lang = (navigator.language || navigator.userLanguage || 'fr').toLowerCase();
      var target = lang.indexOf('fr') === 0 ? '/fr/' : '/en/';
      window.location.replace(target);
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url=/fr/">
  </noscript>
</head>
<body>
  <p>Redirecting to <a href="fr/">/fr/</a> or <a href="en/">/en/</a>&hellip;</p>
