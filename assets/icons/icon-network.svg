<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="#0047AB" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
  <!-- Connecting lines from center to 6 satellites -->
  <line x1="50" y1="50" x2="50" y2="14"/>
  <line x1="50" y1="50" x2="81" y2="32"/>
  <line x1="50" y1="50" x2="81" y2="68"/>
  <line x1="50" y1="50" x2="50" y2="86"/>
  <line x1="50" y1="50" x2="19" y2="68"/>
  <line x1="50" y1="50" x2="19" y2="32"/>
  <!-- Central node (larger) -->
  <circle cx="50" cy="50" r="9" fill="#0047AB" stroke="none"/>
  <!-- 6 satellite nodes -->
  <circle cx="50" cy="14" r="6" fill="#0047AB" stroke="none"/>
  <circle cx="81" cy="32" r="6" fill="#0047AB" stroke="none"/>
  <circle cx="81" cy="68" r="6" fill="#0047AB" stroke="none"/>
  <circle cx="50" cy="86" r="6" fill="#0047AB" stroke="none"/>
  <circle cx="19" cy="68" r="6" fill="#0047AB" stroke="none"/>
  <circle cx="19" cy="32" r="6" fill="#0047AB" stroke="none"/>
</svg>
